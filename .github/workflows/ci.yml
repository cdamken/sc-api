name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install package
        run: python3 -m pip install -e .
      - name: smoke import (sanity check the package builds + imports)
        run: |
          python3 -c "
          import sc_api
          for m in ('auth', 'client', 'cookies', 'identity', 'portfolio',
                    'profiles', 'protocol', 'savings', 'securities',
                    'transactions', 'wealth'):
              if not hasattr(sc_api, m):
                  raise SystemExit(f'sc_api.{m} missing')
          print('OK — all 11 modules importable')
          "
